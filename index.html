<!doctype html>
<html lang="ru">
  <head>
    <meta charset="utf-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1, viewport-fit=cover"
    />
    <meta name="theme-color" content="#f8f6ee" />
    <title>n1o.ru</title>
    <link rel="icon" type="image/svg+xml" href="favicon.svg" />
    <link rel="stylesheet" href="css/style.css" />
  </head>
  <body>
    <main class="stage" aria-label="Rotating ASCII globe">
      <canvas id="ascii-field" class="ascii-field" aria-hidden="true"></canvas>
      <div id="globe" class="globe">
        <pre id="ascii-globe" aria-hidden="true"></pre>
        <svg
          id="route-layer"
          viewBox="0 0 100 60"
          preserveAspectRatio="none"
          aria-hidden="true"
        ></svg>
      </div>
      <aside
        class="country-panel"
        aria-label="Countries connected on the globe"
      >
        <div class="country-panel__title">COUNTRIES</div>
        <ol class="country-list" id="country-list"></ol>
        <div class="country-panel__city" id="city-list"></div>
      </aside>
    </main>
    <script src="js/countries.generated.js"></script>
    <script src="js/index.js"></script>
  </body>
</html>
